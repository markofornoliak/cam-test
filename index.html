<button id="startBtn">ЗАПУСТИТЬ HD КАМЕРУ</button>
<div id="loader">Loading...</div>
<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas" style="display:none"></canvas>

<script>
const btn = document.getElementById('startBtn');
const loader = document.getElementById('loader');
btn.onclick = async () => {
    loader.textContent = "Инициализация камеры...";
    btn.style.display = 'none';
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: { ideal: 7680 }, height: { ideal: 4320 } }
        });
        const video = document.getElementById('video');
        video.srcObject = stream;

        // Ждём адаптации сенсора
        await new Promise(r => setTimeout(r, 2000));

        const canvas = document.getElementById('canvas');
        const track = stream.getVideoTracks()[0];
        const settings = track.getSettings();
        canvas.width = settings.width;
        canvas.height = settings.height;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

        stream.getTracks().forEach(t => t.stop());

        const dataURL = canvas.toDataURL('image/jpeg', 1.0);
        const a = document.createElement('a');
        a.href = dataURL;
        a.download = `photo_${Date.now()}.jpg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        loader.textContent = "Фото сделано!";
    } catch (e) {
        loader.textContent = "Ошибка: разрешите доступ к камере";
        console.error(e);
    }
};
</script>
