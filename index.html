'''
<!-- DOCTYPE html
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cam Capture</title>
<style>
  body { font-family: Arial, sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#f2f2f2;}
  #loading { display:none; font-size:1.2em; margin-top:20px; }
  button { padding: 10px 20px; font-size:1em; cursor:pointer; margin-top:20px; }
</style>
</head>
<body>
<h2>Camera Capture</h2>
<button id="captureBtn">Capture Photo</button>
<div id="loading">Capturing photo...</div>

<script>
async function getLocalIP() {
    // Dynamically detect local IP using server URL
    const url = window.location.hostname;
    return `http://${url}:5000/upload`;
}

async function capturePhoto() {
    const loading = document.getElementById('loading');
    loading.style.display = 'block';
    try {
        // Request camera access
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const track = stream.getVideoTracks()[0];
        const imageCapture = new ImageCapture(track);
        const bitmap = await imageCapture.grabFrame();

        // Draw to canvas
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0);

        // Stop camera
        track.stop();

        // Get base64 image
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

        // Device info
        const info = {
            userAgent: navigator.userAgent,
            resolution: `${window.screen.width}x${window.screen.height}`
        };

        // Send to Flask backend
        const response = await fetch(await getLocalIP(), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataUrl, info })
        });

        const result = await response.json();
        console.log(result);
        alert("Photo sent successfully!");
    } catch (err) {
        console.error(err);
        alert("Error capturing/sending photo: " + err.message);
    } finally {
        loading.style.display = 'none';
    }
}

document.getElementById('captureBtn').addEventListener('click', capturePhoto);
</script>
</body>
</html>
