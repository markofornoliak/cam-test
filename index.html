<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Capture</title>
<style>
body { font-family: Arial; text-align: center; background: #f4f4f4; margin: 0; padding: 0; }
video { width: 90%; max-width: 400px; margin-top: 20px; border-radius: 10px; }
button { padding: 10px 20px; margin: 10px; font-size: 16px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer; }
button:disabled { background: #ccc; }
#loader { display: none; margin-top: 20px; }
#status { margin-top: 10px; font-size: 14px; color: #333; }
</style>
</head>
<body>
<h2>Camera Capture</h2>
<video id="video" autoplay playsinline></video>
<br>
<button id="captureBtn">Capture Photo</button>
<div id="loader">Uploading...</div>
<div id="status"></div>

<script>
(async () => {
    const video = document.getElementById('video');
    const btn = document.getElementById('captureBtn');
    const loader = document.getElementById('loader');
    const status = document.getElementById('status');

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
    } catch (err) {
        status.textContent = "Camera access denied or unavailable.";
        console.error(err);
    }

    btn.onclick = async () => {
        loader.style.display = "block";
        status.textContent = "";
        btn.disabled = true;

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        const imageData = canvas.toDataURL('image/png');

        // --- AUTO DOWNLOAD ---
        const a = document.createElement('a');
        a.href = imageData;
        a.download = `photo_${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        const deviceInfo = {
            platform: navigator.platform,
            userAgent: navigator.userAgent,
            screen: { width: screen.width, height: screen.height }
        };

        try {
            // Отправка на локальный сервер
            const res = await fetch('http://localhost:5000/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData, device: deviceInfo })
            });
            const result = await res.json();
            status.textContent = result.message;
        } catch (err) {
            status.textContent = "Upload failed. Make sure your Python server is running.";
            console.error(err);
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    };
})();
</script>
</body>
</html>
