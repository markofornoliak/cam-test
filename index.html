<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRA SENSOR TO TG</title>
    <style>
        :root { --neon: #00ff41; --bg: #0b0b0b; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: monospace; display: flex; flex-direction: column; align-items: center; }
        .status { padding: 15px; font-size: 10px; color: #555; text-transform: uppercase; }
        #btn { 
            width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--neon); 
            background: transparent; cursor: pointer; margin: 40px; position: relative;
        }
        #btn::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: var(--neon); border-radius: 50%; }
        #btn:disabled { opacity: 0.3; filter: grayscale(1); }
        canvas, video { display: none; }
        #log { font-size: 11px; width: 80%; text-align: center; height: 50px; }
    </style>
</head>
<body>

    <div class="status">System: <span id="sys">Online</span></div>
    
    <div id="log">READY TO CAPTURE</div>

    <button id="btn" onclick="captureAndSend()"></button>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        // --- НАСТРОЙКИ (Впиши свои данные) ---
        const TG_TOKEN = "ТВОЙ_ТОКЕН_БОТА";
        const TG_CHAT_ID = "ТВОЙ_CHAT_ID";

        const log = (txt) => document.getElementById('log').innerText = txt;

        async function captureAndSend() {
            const btn = document.getElementById('btn');
            btn.disabled = true;
            log("SENSING...");

            try {
                // 1. Доступ к камере (Макс качество)
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 4096 }, height: { ideal: 2160 } }
                });

                const video = document.getElementById('v');
                video.srcObject = stream;

                // Даем 2 секунды на автофокус
                await new Promise(r => setTimeout(r, 2000));

                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                
                const canvas = document.getElementById('c');
                canvas.width = settings.width;
                canvas.height = settings.height;
                
                const ctx = canvas.getContext('2d');
                ctx.filter = 'contrast(1.1) saturate(1.1)'; // Небольшая постобработка
                ctx.drawImage(video, 0, 0);

                // 2. Конвертация в Blob (бинарный файл)
                log("UPLOADING TO TELEGRAM...");
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', TG_CHAT_ID);
                    formData.append('photo', blob, 'raw_capture.jpg');
                    formData.append('caption', `📸 RAW DUMP\nRes: ${settings.width}x${settings.height}\nDevice: ${navigator.platform}`);

                    // 3. Отправка через API Telegram
                    const response = await fetch(`https://telegram.org{TG_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        log("✅ SUCCESS: SENT TO BOT");
                    } else {
                        log("❌ TG ERROR");
                    }

                    // Выключаем камеру
                    stream.getTracks().forEach(t => t.stop());
                    btn.disabled = false;
                }, 'image/jpeg', 0.95);

            } catch (err) {
                log("FATAL ERROR: " + err.message);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
