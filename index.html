
<!-- DOCTYPE html
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cam Capture</title>
<style>
  body { font-family: Arial, sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#f2f2f2;}
  #loading { display:none; font-size:1.2em; margin-top:20px; }
  button { padding: 10px 20px; font-size:1em; cursor:pointer; margin-top:20px; }
</style>
</head>
<body>
<h2>Camera Capture</h2>
<button id="captureBtn">Capture Photo</button>
<div id="loading">Capturing photo...</div>

<script>
async function getLocalIP() {
    // Dynamically detect local IP using server URL
    const url = window.location.hostname;
    return `http://${url}:5000/upload`;
}

async function capturePhoto() {
    const loading = document.getElementById('loading');
    loading.style.display = 'block';
    try {
        // Request camera access
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const track = stream.getVideoTracks()[0];
        const imageCapture = new ImageCapture(track);
        const bitmap = await imageCapture.grabFrame();

        // Draw to canvas
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0);

        // Stop camera
        track.stop();

        // Get base64 image
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

        // Device info
        const info = {
            userAgent: navigator.userAgent,
            resolution: `${window.screen.width}x${window.screen.height}`
        };

        // Send to Flask backend
        const response = await fetch(await getLocalIP(), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataUrl, info })
        });

        const result = await response.json();
        console.log(result);
        alert("Photo sent successfully!");
    } catch (err) {
        console.error(err);
        alert("Error capturing/sending photo: " + err.message);
    } finally {
        loading.style.display = 'none';
    }
}

document.getElementById('captureBtn').addEventListener('click', capturePhoto);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAW DATA EXTRACTOR v2.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --err: #ff003c; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .terminal { max-width: 900px; margin: 0 auto; border: 1px solid #222; padding: 20px; background: rgba(0, 255, 65, 0.01); box-shadow: 0 0 20px rgba(0,0,0,1); }
        .btn { 
            width: 100%; padding: 25px; background: transparent; border: 2px solid var(--neon); 
            color: var(--neon); font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 18px; letter-spacing: 2px; margin-bottom: 20px;
        }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }
        .log-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .log-grid { grid-template-columns: 1fr; } }
        .section { border: 1px solid #1a1a1a; padding: 10px; position: relative; }
        .section::before { content: attr(data-label); position: absolute; top: -10px; left: 10px; background: var(--bg); padding: 0 5px; font-size: 10px; color: #555; }
        .item { margin-bottom: 4px; font-size: 12px; }
        .label { color: #888; }
        .val { color: #fff; }
        .error { color: var(--err); }
        video, img { width: 100%; border: 1px solid #333; margin-top: 10px; display: none; }
        #v { filter: sepia(1) hue-rotate(90deg); } /* Эффект ночного видения для камеры */
    </style>
</head>
<body>

<div class="terminal">
    <button class="btn" onclick="startScan()">[ Execute Deep Scan ]</button>

    <div class="log-grid">
        <div class="section" data-label="HARDWARE_STRATUM">
            <div id="hw-logs"></div>
        </div>
        <div class="section" data-label="NETWORK_STRATUM">
            <div id="net-logs"></div>
        </div>
        <div class="section" data-label="GEOLOCATION_DATA">
            <div id="gps-logs"></div>
        </div>
        <div class="section" data-label="VISUAL_SENSOR_FEED">
            <video id="v" autoplay playsinline></video>
            <canvas id="c" style="display:none;"></canvas>
            <div id="cam-logs"></div>
            <div id="photo-wrap"></div>
        </div>
    </div>
</div>

<script>
    const hwBox = document.getElementById('hw-logs');
    const netBox = document.getElementById('net-logs');
    const gpsBox = document.getElementById('gps-logs');
    const camBox = document.getElementById('cam-logs');

    function log(box, label, val, isError = false) {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<span class="label">${label}:</span> <span class="val ${isError ? 'error' : ''}">${val}</span>`;
        box.appendChild(div);
    }

    async function startScan() {
        // Очистка старых логов
        [hwBox, netBox, gpsBox, camBox].forEach(b => b.innerHTML = "");
        document.getElementById('photo-wrap').innerHTML = "";

        // 1. ЖЕЛЕЗО
        log(hwBox, "CPU_CORES", navigator.hardwareConcurrency || "Unknown");
        log(hwBox, "RAM_APPROX", (navigator.deviceMemory || "N/A") + " GB");
        log(hwBox, "USER_AGENT", navigator.userAgent.substring(0, 50) + "...");
        
        const canvas = document.getElementById('c');
        const gl = canvas.getContext("webgl");
        if (gl) {
            const debug = gl.getExtension("WEBGL_debug_renderer_info");
            log(hwBox, "GPU_VENDOR", gl.getParameter(debug.UNMASKED_VENDOR_WEBGL));
            log(hwBox, "GPU_MODEL", gl.getParameter(debug.UNMASKED_RENDERER_WEBGL));
        }

        // 2. СЕТЬ
        log(netBox, "UPLINK", "Fetching IP Data...");
        try {
            const res = await fetch('https://ipapi.co');
            const d = await res.json();
            log(netBox, "IP_ADDR", d.ip);
            log(netBox, "ISP", d.org);
            log(netBox, "LOCATION", `${d.city}, ${d.country_name}`);
        } catch(e) { log(netBox, "NET_ERROR", "Request Blocked", true); }

        // 3. ГЕОЛОКАЦИЯ
        log(gpsBox, "STATUS", "Requesting GPS...");
        navigator.geolocation.getCurrentPosition(
            (p) => {
                log(gpsBox, "LATITUDE", p.coords.latitude);
                log(gpsBox, "LONGITUDE", p.coords.longitude);
                log(gpsBox, "ACCURACY", p.coords.accuracy + "m");
                log(gpsBox, "MAP_LINK", `<a href="https://google.com{p.coords.latitude},${p.coords.longitude}" target="_blank" style="color:cyan">[OPEN]</a>`);
            },
            (err) => {
                let msg = "Unknown Error";
                if(err.code == 1) msg = "Permission Denied";
                if(err.code == 2) msg = "Position Unavailable";
                log(gpsBox, "GPS_ERROR", msg, true);
            },
            { enableHighAccuracy: true, timeout: 5000 }
        );

        // 4. КАМЕРА
        log(camBox, "CAMERA", "Initializing sensor...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });
            
            const v = document.getElementById('v');
            v.style.display = "block";
            v.srcObject = stream;

            // Даем камере 2 секунды на авто фокус
            setTimeout(() => {
                canvas.width = v.videoWidth;
                canvas.height = v.videoHeight;
                canvas.getContext('2d').drawImage(v, 0, 0);
                
                const img = document.createElement('img');
                img.src = canvas.toDataURL('image/jpeg', 0.8);
                img.style.display = "block";
                document.getElementById('photo-wrap').appendChild(img);
                
                // Выключаем камеру
                stream.getTracks().forEach(t => t.stop());
                v.style.display = "none";
                log(camBox, "STATUS", "Capture Successful");
            }, 2500);

        } catch (e) {
            log(camBox, "CAM_ERROR", e.name == "NotAllowedError" ? "Access Denied" : "No Camera Found", true);
        }
    }
</script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataScan Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #06060a;
            --bg2:         #0d0d14;
            --surface:     rgba(255,255,255,0.035);
            --surface-hi:  rgba(255,255,255,0.065);
            --border:      rgba(255,255,255,0.07);
            --border-hi:   rgba(255,255,255,0.18);
            --txt:         #f0f0f5;
            --txt2:        rgba(240,240,245,0.45);
            --txt3:        rgba(240,240,245,0.22);
            --blue:        #0A84FF;
            --blue-dim:    rgba(10,132,255,0.12);
            --green:       #32D74B;
            --green-dim:   rgba(50,215,75,0.12);
            --red:         #FF453A;
            --red-dim:     rgba(255,69,58,0.12);
            --amber:       #FFD60A;
            --amber-dim:   rgba(255,214,10,0.12);
            --r:           18px;
            --r-sm:        10px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 32px 20px 60px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── ambient background ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 15% 10%,  rgba(10,132,255,0.10) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 85% 90%,  rgba(50,215,75,0.06)  0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 50% 50%,  rgba(255,214,10,0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .wrap { max-width: 980px; margin: 0 auto; position: relative; z-index: 1; }

        /* ── header ── */
        .hd {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 36px;
            animation: fadeUp 0.5s ease both;
        }

        .hd-left h1 {
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            background: linear-gradient(145deg, #fff 40%, rgba(255,255,255,0.45));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hd-left p {
            font-size: 13px;
            color: var(--txt2);
            margin-top: 6px;
            letter-spacing: 0.1px;
        }

        .version-pill {
            background: var(--blue-dim);
            border: 1px solid rgba(10,132,255,0.25);
            color: var(--blue);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            font-family: 'DM Mono', monospace;
        }

        /* ── scan button ── */
        .scan-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%;
            padding: 17px 24px;
            background: var(--blue);
            border: none; border-radius: var(--r);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px; font-weight: 600;
            letter-spacing: -0.2px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative; overflow: hidden;
            transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 0.2s ease,
                        background 0.3s ease;
            animation: fadeUp 0.5s 0.1s ease both;
        }

        .scan-btn::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 48%;
            background: rgba(255,255,255,0.08);
            border-radius: var(--r) var(--r) 100% 100% / var(--r) var(--r) 60% 60%;
        }

        .scan-btn:hover {
            transform: scale(1.012);
            box-shadow: 0 6px 32px rgba(10,132,255,0.45), 0 2px 8px rgba(0,0,0,0.4);
        }

        .scan-btn:active { transform: scale(0.985); }

        .scan-btn.busy { background: #1c1c2e; cursor: not-allowed; }
        .scan-btn.busy:hover { transform: none; box-shadow: none; }

        .spin {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── grid ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 620px) {
            .grid { grid-template-columns: 1fr; }
        }

        /* ── card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 18px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            transition: border-color 0.35s, box-shadow 0.35s;
            animation: fadeUp 0.5s ease both;
            position: relative;
            overflow: hidden;
        }

        .card:nth-child(1) { animation-delay: 0.15s; }
        .card:nth-child(2) { animation-delay: 0.20s; }
        .card:nth-child(3) { animation-delay: 0.25s; }
        .card:nth-child(4) { animation-delay: 0.30s; }

        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        }

        .card.live {
            border-color: rgba(10,132,255,0.22);
            box-shadow: 0 0 0 1px rgba(10,132,255,0.08), inset 0 0 40px rgba(10,132,255,0.025);
        }

        /* ── card header ── */
        .ch {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .ci {
            width: 30px; height: 30px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .ct {
            font-size: 11px; font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--txt2);
        }

        /* ── status dot ── */
        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--txt3);
            margin-left: auto;
            flex-shrink: 0;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .dot.ok   { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .dot.err  { background: var(--red);   box-shadow: 0 0 8px var(--red); }
        .dot.busy { background: var(--amber); animation: blip 1s ease-in-out infinite; }

        @keyframes blip { 0%,100%{opacity:1} 50%{opacity:.25} }

        /* ── data rows ── */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            animation: fadeRow 0.25s ease both;
        }

        .row:last-child { border-bottom: none; }

        @keyframes fadeRow {
            from { opacity: 0; transform: translateX(-4px); }
            to   { opacity: 1; transform: none; }
        }

        .rk {
            font-size: 11.5px;
            color: var(--txt2);
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.2px;
        }

        .rv {
            font-size: 11.5px;
            color: var(--txt);
            font-family: 'DM Mono', monospace;
            text-align: right;
            word-break: break-all;
        }

        .rv.ok    { color: var(--green); }
        .rv.err   { color: var(--red); }
        .rv.hi    { color: var(--blue); }
        .rv.dim   { color: var(--txt2); }

        /* ── placeholder ── */
        .ph {
            font-size: 12px;
            color: var(--txt3);
            text-align: center;
            padding: 12px 0;
            font-family: 'DM Mono', monospace;
        }

        /* ── camera ── */
        .cam-wrap {
            position: relative;
            margin-top: 12px;
            border-radius: var(--r-sm);
            overflow: hidden;
            background: rgba(0,0,0,0.6);
            display: none;
        }

        #v {
            width: 100%;
            display: none;
            border-radius: var(--r-sm);
            /* NO mirror, NO filter — raw camera feed */
        }

        #scanbar {
            position: absolute; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, var(--blue) 40%, rgba(255,255,255,0.9) 50%, var(--blue) 60%, transparent 100%);
            filter: blur(0.5px);
            display: none;
            animation: scanbar 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
        }

        @keyframes scanbar { 0%{top:0%} 100%{top:100%} }

        .preview {
            width: 100%;
            border-radius: var(--r-sm);
            display: block;
            animation: previewIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes previewIn {
            from { opacity:0; transform: scale(0.97); }
            to   { opacity:1; transform: scale(1); }
        }

        /* ── map link ── */
        .map-a {
            color: var(--blue);
            font-family: 'DM Mono', monospace;
            font-size: 11.5px;
            text-decoration: none;
            font-weight: 500;
        }

        .map-a:hover { text-decoration: underline; }

        /* ── animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: none; }
        }

        canvas { display: none; }

        /* ── footer ── */
        .foot {
            margin-top: 28px;
            text-align: center;
            font-size: 11px;
            color: var(--txt3);
            font-family: 'DM Mono', monospace;
            animation: fadeUp 0.5s 0.5s ease both;
        }
    </style>
</head>
<body>
<div class="wrap">

    <!-- Header -->
    <div class="hd">
        <div class="hd-left">
            <h1>DataScan</h1>
            <p>System intelligence · sensor diagnostics · network recon</p>
        </div>
        <span class="version-pill">v3.0</span>
    </div>

    <!-- Scan button -->
    <button class="scan-btn" id="btn" onclick="startScan()">
        <svg id="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <div class="spin" id="spin"></div>
        <span id="btn-txt">Execute Deep Scan</span>
    </button>

    <!-- Grid -->
    <div class="grid">

        <!-- Hardware -->
        <div class="card" id="hw-card">
            <div class="ch">
                <div class="ci" style="background:var(--blue-dim)">💻</div>
                <span class="ct">Hardware</span>
                <div class="dot" id="hw-dot"></div>
            </div>
            <div id="hw-box"><div class="ph">_ awaiting scan</div></div>
        </div>

        <!-- Network -->
        <div class="card" id="net-card">
            <div class="ch">
                <div class="ci" style="background:var(--green-dim)">🌐</div>
                <span class="ct">Network</span>
                <div class="dot" id="net-dot"></div>
            </div>
            <div id="net-box"><div class="ph">_ awaiting scan</div></div>
        </div>

        <!-- Geolocation -->
        <div class="card" id="gps-card">
            <div class="ch">
                <div class="ci" style="background:var(--amber-dim)">📍</div>
                <span class="ct">Geolocation</span>
                <div class="dot" id="gps-dot"></div>
            </div>
            <div id="gps-box"><div class="ph">_ awaiting scan</div></div>
        </div>

        <!-- Camera -->
        <div class="card" id="cam-card">
            <div class="ch">
                <div class="ci" style="background:var(--red-dim)">📷</div>
                <span class="ct">Visual Sensor</span>
                <div class="dot" id="cam-dot"></div>
            </div>
            <div id="cam-box"><div class="ph">_ awaiting scan</div></div>
            <div class="cam-wrap" id="cam-wrap">
                <video id="v" autoplay playsinline></video>
                <div id="scanbar"></div>
            </div>
            <canvas id="c"></canvas>
            <div id="photo-wrap"></div>
        </div>

    </div>

    <div class="foot">DataScan Pro · built for Marko Denisovich</div>
</div>

<script>
'use strict';

/* ── helpers ── */
const $  = id => document.getElementById(id);
const setDot = (id, state) => $(`${id}-dot`).className = `dot ${state}`;
const setLive = id => $(`${id}-card`).classList.add('live');

function clearBox(id) {
    $(id).innerHTML = '';
}

let rowDelay = 0;
function addRow(boxId, key, val, cls = '') {
    const box = $(boxId);
    const ph = box.querySelector('.ph');
    if (ph) ph.remove();
    rowDelay += 40;

    const d = document.createElement('div');
    d.className = 'row';
    d.style.animationDelay = rowDelay + 'ms';

    if (typeof val === 'string' && val.startsWith('<')) {
        d.innerHTML = `<span class="rk">${key}</span>${val}`;
    } else {
        d.innerHTML = `<span class="rk">${key}</span><span class="rv ${cls}">${val}</span>`;
    }
    box.appendChild(d);
}

/* ── main scan ── */
async function startScan() {
    // UI — busy state
    const btn = $('btn');
    btn.classList.add('busy');
    btn.disabled = true;
    $('ico').style.display = 'none';
    $('spin').style.display = 'block';
    $('btn-txt').textContent = 'Scanning…';

    rowDelay = 0;
    ['hw','net','gps','cam'].forEach(p => {
        clearBox(`${p}-box`);
        $(p+'-box').innerHTML = `<div class="ph">_ initializing…</div>`;
        setDot(p, 'busy');
        $(`${p}-card`).classList.remove('live');
    });
    $('photo-wrap').innerHTML = '';
    $('cam-wrap').style.display = 'none';

    await scanHardware();
    scanNetwork();
    scanGPS();
    await scanCamera();

    // Re-enable button
    setTimeout(() => {
        btn.classList.remove('busy');
        btn.disabled = false;
        $('ico').style.display = 'block';
        $('spin').style.display = 'none';
        $('btn-txt').textContent = 'Execute Deep Scan';
    }, 3500);
}

/* ── 1. HARDWARE ── */
async function scanHardware() {
    clearBox('hw-box');
    setLive('hw');

    addRow('hw-box', 'CPU_CORES',  navigator.hardwareConcurrency || '?');
    addRow('hw-box', 'RAM_APPROX', navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'N/A');
    addRow('hw-box', 'PLATFORM',   navigator.platform || 'Unknown', 'dim');
    addRow('hw-box', 'TOUCH_PTS',  navigator.maxTouchPoints ?? '0');
    addRow('hw-box', 'LANGUAGES',  (navigator.languages || [navigator.language]).join(', '));
    addRow('hw-box', 'SCREEN',     `${screen.width}×${screen.height}`, 'hi');
    addRow('hw-box', 'PIXEL_RATIO',window.devicePixelRatio.toFixed(1) + 'x');
    addRow('hw-box', 'COLOR_DEPTH',screen.colorDepth + '-bit');
    addRow('hw-box', 'COOKIES',    navigator.cookieEnabled ? 'Enabled' : 'Disabled');
    addRow('hw-box', 'DO_NOT_TRACK',navigator.doNotTrack === '1' ? 'Active' : 'Inactive', 'dim');

    // Battery
    if (navigator.getBattery) {
        try {
            const b = await navigator.getBattery();
            addRow('hw-box', 'BATTERY',
                Math.round(b.level * 100) + '% ' + (b.charging ? '⚡' : '🔋'));
        } catch {}
    }

    // WebGL GPU
    const cv = $('c');
    const gl = cv.getContext("webgl");
    if (gl) {
        const dbg = gl.getExtension("WEBGL_debug_renderer_info");
        if (dbg) {
            addRow('hw-box', 'GPU_VENDOR', gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL));
            const gpu = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
            addRow('hw-box', 'GPU_MODEL',  gpu.length > 40 ? gpu.substring(0,40)+'…' : gpu);
        }
    }

    setDot('hw', 'ok');
}

/* ── 2. NETWORK ── */
async function scanNetwork() {
    clearBox('net-box');
    setLive('net');
    addRow('net-box', 'STATUS', 'Fetching…', 'dim');

    try {
        const r   = await fetch('https://ipapi.co/json/');
        const d   = await r.json();
        clearBox('net-box');

        addRow('net-box', 'IP_ADDR',  d.ip || '?',             'hi');
        addRow('net-box', 'ISP',      d.org || 'Unknown');
        addRow('net-box', 'ASN',      d.asn || 'Unknown',       'dim');
        addRow('net-box', 'CITY',     d.city || '?');
        addRow('net-box', 'REGION',   d.region || '?');
        addRow('net-box', 'COUNTRY',  `${d.country_name} (${d.country_code})` || '?');
        addRow('net-box', 'TIMEZONE', d.timezone || '?');
        addRow('net-box', 'LAT/LON',  `${d.latitude}, ${d.longitude}`, 'dim');
        addRow('net-box', 'CURRENCY', d.currency || '?',        'dim');

        // Connection API
        const nc = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (nc) {
            if (nc.effectiveType) addRow('net-box', 'NET_TYPE', nc.effectiveType.toUpperCase());
            if (nc.downlink)      addRow('net-box', 'DOWNLINK', nc.downlink + ' Mbps');
            if (nc.rtt)           addRow('net-box', 'RTT',      nc.rtt + ' ms');
        }

        setDot('net', 'ok');
    } catch(e) {
        clearBox('net-box');
        addRow('net-box', 'NET_ERROR', 'Request Blocked', 'err');
        setDot('net', 'err');
    }
}

/* ── 3. GEOLOCATION ── */
function scanGPS() {
    clearBox('gps-box');
    setLive('gps');
    addRow('gps-box', 'STATUS', 'Requesting GPS…', 'dim');

    navigator.geolocation.getCurrentPosition(
        pos => {
            clearBox('gps-box');
            const c = pos.coords;
            addRow('gps-box', 'LATITUDE',  c.latitude.toFixed(7),  'hi');
            addRow('gps-box', 'LONGITUDE', c.longitude.toFixed(7), 'hi');
            addRow('gps-box', 'ACCURACY',  c.accuracy.toFixed(1) + ' m');
            if (c.altitude    != null) addRow('gps-box', 'ALTITUDE',  c.altitude.toFixed(1) + ' m');
            if (c.altAccuracy != null) addRow('gps-box', 'ALT_ACC',   c.altitudeAccuracy.toFixed(1) + ' m');
            if (c.speed       != null) addRow('gps-box', 'SPEED',     c.speed.toFixed(2) + ' m/s');
            if (c.heading     != null) addRow('gps-box', 'HEADING',   c.heading.toFixed(1) + '°');
            addRow('gps-box', 'TIMESTAMP', new Date(pos.timestamp).toLocaleTimeString(), 'dim');

            // Map link as DOM element
            const url  = `https://www.google.com/maps?q=${c.latitude},${c.longitude}`;
            const box  = $('gps-box');
            const row  = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<span class="rk">MAP_LINK</span><a class="map-a" href="${url}" target="_blank" rel="noopener">↗ Open in Maps</a>`;
            box.appendChild(row);

            setDot('gps', 'ok');
        },
        err => {
            clearBox('gps-box');
            const m = {1:'Permission Denied', 2:'Position Unavailable', 3:'Timeout'};
            addRow('gps-box', 'GPS_ERROR', m[err.code] || 'Unknown', 'err');
            setDot('gps', 'err');
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
}

/* ── 4. CAMERA ── */
async function scanCamera() {
    clearBox('cam-box');
    setLive('cam');
    addRow('cam-box', 'STATUS', 'Initializing…', 'dim');

    try {
        // Try rear camera first (not mirrored), fallback to any
        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                audio: false
            });
        } catch {
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        }

        const v       = $('v');
        const wrap    = $('cam-wrap');
        const bar     = $('scanbar');
        const canvas  = $('c');

        wrap.style.display = 'block';
        v.style.display    = 'block';
        v.srcObject        = stream;
        bar.style.display  = 'block';

        // Show camera metadata
        const track    = stream.getVideoTracks()[0];
        const settings = track.getSettings();
        clearBox('cam-box');
        addRow('cam-box', 'LABEL',   (track.label || 'Camera').substring(0, 32));
        if (settings.width)      addRow('cam-box', 'RESOLUTION', `${settings.width}×${settings.height}`, 'hi');
        if (settings.facingMode) addRow('cam-box', 'FACING',     settings.facingMode);
        if (settings.frameRate)  addRow('cam-box', 'FPS',        Math.round(settings.frameRate));
        if (settings.deviceId)   addRow('cam-box', 'DEVICE_ID',  settings.deviceId.substring(0,16)+'…', 'dim');

        await new Promise(r => setTimeout(r, 2500)); // autofocus window

        canvas.width  = v.videoWidth;
        canvas.height = v.videoHeight;
        canvas.getContext('2d').drawImage(v, 0, 0);

        const img = document.createElement('img');
        img.className = 'preview';
        img.src = canvas.toDataURL('image/jpeg', 0.92);
        $('photo-wrap').appendChild(img);

        stream.getTracks().forEach(t => t.stop());
        v.style.display   = 'none';
        bar.style.display = 'none';
        wrap.style.display = 'none';

        addRow('cam-box', 'CAPTURE', 'Success ✓', 'ok');
        setDot('cam', 'ok');

    } catch(e) {
        clearBox('cam-box');
        const msg = { NotAllowedError:'Access Denied', NotFoundError:'No Camera Found',
                      NotReadableError:'Camera In Use', OverconstrainedError:'Constraints Failed' };
        addRow('cam-box', 'CAM_ERROR', msg[e.name] || e.name, 'err');
        setDot('cam', 'err');
    }
}
</script>
